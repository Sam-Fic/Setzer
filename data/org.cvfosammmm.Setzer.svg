<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="512" height="512" viewBox="0 0 512 512" version="1.1"
     xmlns="http://www.w3.org/2000/svg">
  <title>LaTeX Editor</title>
  <defs>
    <linearGradient id="circGrad" x1="0" y1="0" x2="0.25" y2="1">
      <stop offset="0" stop-color="#9470c0"/>
      <stop offset="1" stop-color="#5c3880"/>
    </linearGradient>
    <linearGradient id="sqGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7450a0"/>
      <stop offset="1" stop-color="#452860"/>
    </linearGradient>
    <linearGradient id="hl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c0a0e8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c0a0e8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#c0a0e8" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="circClip">
      <circle cx="201" cy="256" r="120"/>
    </clipPath>
    <clipPath id="sqClip">
      <rect x="251" y="166" width="180" height="180" rx="10" ry="10"/>
    </clipPath>
  </defs>

  <!-- Circle: thickness -->
  <circle cx="201" cy="270" r="120" fill="#1e0f2a"/>
  <circle cx="201" cy="263" r="120" fill="#301a45"/>
  <!-- Circle: face -->
  <circle cx="201" cy="256" r="120" fill="url(#circGrad)"/>

  <!-- Square: thickness -->
  <rect x="251" y="180" width="180" height="180" rx="10" ry="10" fill="#1e0f2a"/>
  <rect x="251" y="173" width="180" height="180" rx="10" ry="10" fill="#301a45"/>
  <!-- Square: face -->
  <rect x="251" y="166" width="180" height="180" rx="10" ry="10" fill="url(#sqGrad)"/>

  <!-- Intersection zone -->
  <g clip-path="url(#circClip)">
    <rect x="251" y="166" width="180" height="180" rx="10" ry="10"
          fill="#221038" fill-opacity="0.72"/>
  </g>

  <!-- Accent diamond at top-right -->
  <rect x="383" y="178" width="18" height="18" rx="3" ry="3"
        fill="#f0c040" transform="rotate(45,392,187)"/>

  <!-- TeX logo, auto-centered by browser (square center x=341, y=256) -->
  <text x="341" y="274" fill="white" fill-opacity="0.92"
        font-family="'STIX Two Text', 'DejaVu Serif', 'Noto Serif', serif"
        font-size="54" font-weight="bold" text-anchor="middle">
    T<tspan dy="12" font-size="38" font-weight="normal">E</tspan>X
  </text>
</svg>
